# Docker：不要在启动时解析 upstream 主机名，否则单独起前端容器时会因找不到「backend」而直接退出。
# 使用 127.0.0.11（Docker 内置 DNS）在请求时再解析；与后端需在同一 user-defined 网络，且服务名/容器名为 backend。
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    # 默认 1m，超过会 413；与后端 MAX_FILE_SIZE（100MB）对齐
    client_max_body_size 100m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        set $api_upstream http://backend:8000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 流式接口（如对话 SSE）避免缓冲截断
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
